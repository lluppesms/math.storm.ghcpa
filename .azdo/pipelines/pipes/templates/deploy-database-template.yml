# ----------------------------------------------------------------------------------------------------
# Template to build SQL DACPAC and deploy to Azure SQL
# ----------------------------------------------------------------------------------------------------
# Required variable group / pipeline variables:
#   sqlServerName      - SQL Server name WITHOUT the .database.windows.net suffix
#                        (e.g. 'myserver', not 'myserver.database.windows.net')
#   sqlDatabaseName    - The target database name (e.g. 'MathStormDB-dev')
#   sqlAdminUser       - SQL administrator username
#   sqlAdminPassword   - SQL administrator password (mark as secret in Azure DevOps)
# ----------------------------------------------------------------------------------------------------
parameters:
- name: environmentName
  default: 'DEV'
- name: sqlProjectPath
  default: 'src/sql.database/MathStorm.Database.sqlproj'
- name: serviceConnectionName
  default: ''

# ----------------------------------------------------------------------------------------------------
jobs:
- job: BuildDeployDatabase
  displayName: Build and Deploy Database
  variables:
    - name: environmentNameLower
      value: ${{ lower(parameters.environmentName) }}
    - template: ../../vars/var-service-connections.yml
    - template: ../../vars/var-common.yml
    - ${{ if eq(lower(parameters.environmentName), 'dev') }}:
      - template: ../../vars/var-dev.yml
    - ${{ if eq(lower(parameters.environmentName), 'qa') }}:
      - template: ../../vars/var-qa.yml
    - ${{ if eq(lower(parameters.environmentName), 'prod') }}:
      - template: ../../vars/var-prod.yml

  steps:
  - task: UseDotNet@2
    displayName: Setup .NET
    inputs:
      version: '10.x'

  - task: DotNetCoreCLI@2
    displayName: Build DACPAC
    inputs:
      command: 'build'
      projects: '${{ parameters.sqlProjectPath }}'
      arguments: '--configuration Release'

  - task: SqlAzureDacpacDeployment@1
    displayName: Deploy DACPAC to Azure SQL
    inputs:
      azureSubscription: ${{ parameters.serviceConnectionName }}
      authenticationType: 'server'
      serverName: '$(sqlServerName).database.windows.net'
      databaseName: '$(sqlDatabaseName)'
      sqlUsername: '$(sqlAdminUser)'
      sqlPassword: '$(sqlAdminPassword)'
      deployType: 'DacpacTask'
      dacpacFile: '**/*.dacpac'
      additionalArguments: '/p:BlockOnPossibleDataLoss=false'
